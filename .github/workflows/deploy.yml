name: Groww Inventory CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Prisma Generate
        run: |
          cd server
          npx prisma generate

      - name: Build Server
        run: |
          cd server
          npm run build

      - name: Install Client Dependencies
        run: |
          cd client
          npm install

      - name: Build Client
        run: |
          cd client
          npm run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false # Set to true and add registry auth for real deployment
          tags: groww-inventory-server:latest

      - name: Build Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: groww-inventory-client:latest
