services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: groww_inventory
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  server:
    build: ./server
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql://root:root@db:3306/groww_inventory
      PORT: 5000
    depends_on:
      - db

  client:
    build: ./client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  db_data:
